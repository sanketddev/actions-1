name: Matrix Demo

on:
    push:
    workflow_dispatch:
      
jobs:
    matrix-job:
        strategy:
          fail-fast: false
          max-parallel: 2
          matrix:
            os: [ubuntu-latest, ubuntu-22.04, windows-latest]
            images: [hello-world, alpine]
            exclude:
                - images: alpine
                  os: windows-latest
            include:
                - images: amd64/alpine
                  os: ubuntu-22.04
        runs-on: ${{ matrix.os }}
        steps:
          - name: Docker Details
            run: docker info

          - name: Run Images on ${{ matrix.os }}
            run: docker run ${{ matrix.os }}